services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: productos-db
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=Password123!
      - MSSQL_PID=Express
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "Password123!" -C -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  db-init:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: productos-db-init
    depends_on:
      sqlserver:
        condition: service_healthy
    volumes:
      - ./docker/init-db.sql:/init-db.sql
    entrypoint: /opt/mssql-tools18/bin/sqlcmd -S sqlserver -U sa -P "Password123!" -C -d master -i /init-db.sql
    restart: "no"

  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: productos-api
    ports:
      - "5066:5066"
    environment:
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=ProductosDB;User Id=sa;Password=Password123!;TrustServerCertificate=true;
      - ASPNETCORE_ENVIRONMENT=Development
    depends_on:
      sqlserver:
        condition: service_healthy
    restart: on-failure

  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    container_name: productos-frontend
    ports:
      - "4200:80"
    depends_on:
      - backend

volumes:
  sqlserver-data:
